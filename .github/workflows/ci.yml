name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel
          pip install .

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-python${{ matrix.python-version }}
          path: dist/

  build-deb:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)" >> $GITHUB_ENV

      - name: Build DEB package
        run: |
          mkdir -p deb-build/DEBIAN
          mkdir -p deb-build/usr/bin
          mkdir -p deb-build/usr/lib/python3/dist-packages/kde_toolbox
          mkdir -p deb-build/usr/share/applications

          cp kde-toolbox.desktop deb-build/usr/share/applications/

          cat > deb-build/DEBIAN/control << EOF
Package: kde-toolbox
Version: ${{ env.VERSION }}
Section: utils
Priority: optional
Architecture: all
Depends: python3, python3-pyqt6, python3-schedule, python3-psutil
Maintainer: ${{ github.actor }}
Description: KDE Toolbox
 A PyQt6-based toolbox for managing KDE services with scheduled task support.
EOF

          cat > deb-build/usr/bin/kde-toolbox << 'SCRIPT'
#!/bin/bash
exec python3 -m kde_toolbox.main "$@"
SCRIPT
          chmod +x deb-build/usr/bin/kde-toolbox

          cp -r kde_toolbox/* deb-build/usr/lib/python3/dist-packages/kde_toolbox/

          dpkg-deb --build deb-build kde-toolbox_${{ env.VERSION }}_all.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kde-toolbox-deb
          path: "*.deb"

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/dist/*
          generate_release_notes: true
